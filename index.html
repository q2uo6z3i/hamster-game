<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハムスターお世話ゲーム（画像カスタム版）</title>
<style>
body{font-family:sans-serif;text-align:center;background:#fff4e6}
h1{background:#f7c59f;padding:10px}
.hidden{display:none}

#hamster img{width:200px;transition:0.3s}

.bar{width:200px;height:20px;background:#ddd;margin:5px auto;border-radius:10px;overflow:hidden}
.fill{height:100%;background:#2a9d8f;width:50%}
button{margin:5px;padding:10px 15px;border:none;border-radius:10px;background:#f4a261;color:white;cursor:pointer}

#feedGameArea{width:300px;height:200px;margin:20px auto;background:#fff0c9;border-radius:10px;position:relative}
.food{width:30px;height:30px;background:orange;border-radius:50%;position:absolute}
</style>
</head>
<body>
<h1>🐹 お世話ゲーム 🐹</h1>

<div id="main">
<div id="hamster">
<img id="hamImg" src="/mnt/data/webp_202209_002_s.webp">
</div>

<div>おなか<div class="bar"><div id="hunger" class="fill"></div></div></div>
<div>きれいさ<div class="bar"><div id="clean" class="fill"></div></div></div>
<div>たのしさ<div class="bar"><div id="fun" class="fill"></div></div></div>

<button onclick="startFeed()">餌やり</button>
</div>

<!-- 餌やり画面 -->
<div id="feed" class="hidden">
<h2>餌をドラッグしてあげよう！</h2>
<div id="feedGameArea"></div>
<p>餌をハムスターのところに運べ！</p>
<button onclick="endFeed()">戻る</button>
</div>

<script>
let hunger=50;

function update(){
  document.getElementById("hunger").style.width=hunger+"%";

  const img=document.getElementById("hamImg");
  if(hunger>70){
    img.style.filter="brightness(1.2)";
  }else if(hunger<30){
    img.style.filter="grayscale(80%)";
  }else{
    img.style.filter="none";
  }
}

// 餌やりゲーム（ドラッグ）
function startFeed(){
  document.getElementById("main").classList.add("hidden");
  document.getElementById("feed").classList.remove("hidden");

  const area=document.getElementById("feedGameArea");
  area.innerHTML="";

  let food=document.createElement("div");
  food.className="food";
  food.style.left="10px";
  food.style.top="80px";
  area.appendChild(food);

  let dragging=false;

  food.onmousedown=()=>dragging=true;
  document.onmouseup=()=>dragging=false;
  document.onmousemove=(e)=>{
    if(dragging){
      food.style.left=e.offsetX+"px";
      food.style.top=e.offsetY+"px";

      // ゴール判定（中央あたり）
      if(e.offsetX>120 && e.offsetX<180 && e.offsetY>60 && e.offsetY<120){
        hunger+=40;
        alert("食べた！");
        endFeed();
        update();
      }
    }
  };
}

function endFeed(){
  document.getElementById("feed").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
}

setInterval(()=>{hunger-=1;update()},1000);
update();
</script>
</body>
</html>
