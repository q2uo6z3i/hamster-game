<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハムスターお世話ゲーム（改良版）</title>
<style>
body { font-family: sans-serif; text-align: center; background: #fff4e6; }
h1 { background: #f7c59f; padding: 10px; }

/* ハムスター（CSSで顔） */
#hamster {
  width: 150px;
  height: 150px;
  background: #f5c6a5;
  border-radius: 50%;
  margin: 20px auto;
  position: relative;
}
.eye {
  width: 15px; height: 15px; background: black; border-radius: 50%;
  position: absolute; top: 50px;
}
#eye1 { left: 40px; }
#eye2 { right: 40px; }
#mouth {
  width: 40px; height: 20px;
  border-bottom: 4px solid black;
  border-radius: 0 0 40px 40px;
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
}

.status { margin: 10px; }
.bar { width: 200px; height: 20px; background: #ddd; margin: 5px auto; border-radius: 10px; overflow: hidden; }
.fill { height: 100%; background: #2a9d8f; width: 50%; }
button { margin: 5px; padding: 10px 15px; border: none; border-radius: 10px; background: #f4a261; color: white; cursor: pointer; }
button:hover { background: #e76f51; }
#gameArea { margin-top: 20px; }
</style>
</head>
<body>

<h1>🐹 ハムスターお世話ゲーム 🐹</h1>

<div id="hamster">
  <div id="eye1" class="eye"></div>
  <div id="eye2" class="eye"></div>
  <div id="mouth"></div>
</div>

<div class="status">おなか<div class="bar"><div id="hunger" class="fill"></div></div></div>
<div class="status">きれいさ<div class="bar"><div id="clean" class="fill"></div></div></div>
<div class="status">たのしさ<div class="bar"><div id="fun" class="fill"></div></div></div>

<button onclick="startFeedGame()">餌やり</button>
<button onclick="startCleanGame()">掃除</button>
<button onclick="startWalkGame()">散歩</button>

<div id="gameArea"></div>
<p id="message"></p>

<script>
let hunger=50, clean=50, fun=50;

function update() {
  document.getElementById("hunger").style.width = hunger + "%";
  document.getElementById("clean").style.width = clean + "%";
  document.getElementById("fun").style.width = fun + "%";

  const mouth = document.getElementById("mouth");

  if (hunger>70 && clean>70 && fun>70) {
    mouth.style.borderBottom = "4px solid black"; // ニコ
    mouth.style.borderRadius = "0 0 40px 40px";
  } else if (hunger<30 || clean<30 || fun<30) {
    mouth.style.borderBottom = "none";
    mouth.style.borderTop = "4px solid black"; // 悲しい
    mouth.style.borderRadius = "40px 40px 0 0";
  } else {
    mouth.style.borderBottom = "4px solid black"; // 普通
    mouth.style.borderRadius = "0";
  }
}

/* 餌やり：動くボタン当て */
function startFeedGame(){
  let area=document.getElementById("gameArea");
  area.innerHTML="<p>動くボタンをクリック！</p><button id='foodBtn' style='position:relative'>餌</button>";
  let btn=document.getElementById("foodBtn");
  let move=setInterval(()=>{
    btn.style.left=Math.random()*200-100+"px";
  },300);
  btn.onclick=()=>{
    clearInterval(move);
    hunger+=30;
    document.getElementById("message").textContent="成功！";
    area.innerHTML="";
    update();
  };
}

/* 掃除：制限時間連打 */
function startCleanGame(){
  let count=0;
  let area=document.getElementById("gameArea");
  area.innerHTML="<p>3秒で10回クリック！</p><button onclick='clickClean()'>掃除</button>";
  window.clickClean=()=>{ count++; };
  setTimeout(()=>{
    if(count>=10){ clean+=30; document.getElementById("message").textContent="成功！"; }
    else document.getElementById("message").textContent="失敗…";
    area.innerHTML="";
    update();
  },3000);
}

/* 散歩：反応速度ゲーム */
function startWalkGame(){
  let area=document.getElementById("gameArea");
  area.innerHTML="<p>『今！』が出たらクリック！</p><button id='walkBtn'>待機</button>";
  let btn=document.getElementById("walkBtn");
  let ready=false;
  setTimeout(()=>{
    btn.textContent="今！";
    ready=true;
  },Math.random()*2000+1000);

  btn.onclick=()=>{
    if(ready){ fun+=30; document.getElementById("message").textContent="成功！"; }
    else document.getElementById("message").textContent="早すぎ！";
    area.innerHTML="";
    update();
  };
}

function decrease(){ hunger-=1; clean-=1; fun-=1; update(); }
setInterval(decrease,1000);
update();
</script>

</body>
</html>
