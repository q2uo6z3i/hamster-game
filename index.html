<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハムスターお世話ゲーム（リアル画像版）</title>
<style>
body{font-family:sans-serif;text-align:center;background:#fff4e6}
h1{background:#f7c59f;padding:10px}
.hidden{display:none}

/* ハムスター画像 */
#hamster img{
  width:180px;
  transition:0.3s;
}

.bar{width:200px;height:20px;background:#ddd;margin:5px auto;border-radius:10px;overflow:hidden}
.fill{height:100%;background:#2a9d8f;width:50%}
button{margin:5px;padding:10px 15px;border:none;border-radius:10px;background:#f4a261;color:white;cursor:pointer}

#walkGameArea,#feedGameArea,#cleanGameArea{width:300px;height:200px;margin:20px auto;border-radius:10px;position:relative;overflow:hidden}
#walkGameArea{background:#cdeffd}
#feedGameArea{background:#fff0c9}
#cleanGameArea{background:#e0ffe0}

#player{width:40px;height:40px;position:absolute;bottom:10px;left:20px}
.obstacle{width:20px;height:40px;background:#444;position:absolute;bottom:0}
.food{width:30px;height:30px;position:absolute}
.dirt{width:20px;height:20px;background:brown;border-radius:50%;position:absolute}
</style>
</head>
<body>
<h1>🐹 ハムスターお世話ゲーム 🐹</h1>

<!-- メイン -->
<div id="main">
<div id="hamster">
<img id="hamImg" src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Golden_hamster.jpg">
</div>

<div>おなか<div class="bar"><div id="hunger" class="fill"></div></div></div>
<div>きれいさ<div class="bar"><div id="clean" class="fill"></div></div></div>
<div>たのしさ<div class="bar"><div id="fun" class="fill"></div></div></div>

<button onclick="startFeed()">餌やり</button>
<button onclick="startClean()">掃除</button>
<button onclick="startWalk()">散歩</button>
</div>

<!-- 散歩 -->
<div id="walk" class="hidden">
<h2>ジャンプで障害物回避！</h2>
<div id="walkGameArea">
<img id="player" src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Golden_hamster.jpg">
</div>
<button onclick="endWalk()">戻る</button>
</div>

<!-- 餌やり -->
<div id="feed" class="hidden">
<h2>餌をクリックで集めろ！</h2>
<div id="feedGameArea"></div>
<p id="feedScore">0</p>
<button onclick="endFeed()">戻る</button>
</div>

<!-- 掃除 -->
<div id="cleanScreen" class="hidden">
<h2>汚れを全部クリック！</h2>
<div id="cleanGameArea"></div>
<button onclick="endClean()">戻る</button>
</div>

<script>
let hunger=50,clean=50,fun=50;
function update(){
  hunger=Math.max(0,Math.min(100,hunger));
  clean=Math.max(0,Math.min(100,clean));
  fun=Math.max(0,Math.min(100,fun));

  document.getElementById("hunger").style.width=hunger+"%";
  document.getElementById("clean").style.width=clean+"%";
  document.getElementById("fun").style.width=fun+"%";

  const img=document.getElementById("hamImg");

  if(hunger>70 && clean>70 && fun>70){
    img.style.filter="brightness(1.2)";
  }else if(hunger<30 || clean<30 || fun<30){
    img.style.filter="grayscale(80%)";
  }else{
    img.style.filter="none";
  }
}

// --- 散歩 ---
function startWalk(){switchScreen('walk');startWalkGame()}
function endWalk(){switchScreen('main')}
function startWalkGame(){
  let jumping=false;
  const player=document.getElementById("player");

  document.getElementById("walkGameArea").onclick=()=>{
    if(jumping)return;
    jumping=true;
    let h=0;
    let up=setInterval(()=>{
      if(h>80){
        clearInterval(up);
        let down=setInterval(()=>{
          if(h<=0){clearInterval(down);jumping=false}
          h-=5;player.style.bottom=10+h+"px";
        },20);
      }
      h+=5;player.style.bottom=10+h+"px";
    },20);
  };

  setTimeout(()=>{fun+=40;alert("散歩成功！");endWalk();update()},5000);
}

// --- 餌やり ---
let score=0;
function startFeed(){switchScreen('feed');score=0;spawnFood()}
function spawnFood(){
  const area=document.getElementById("feedGameArea");
  area.innerHTML="";

  for(let i=0;i<5;i++){
    let f=document.createElement("img");
    f.src="https://upload.wikimedia.org/wikipedia/commons/3/32/Sunflower_seeds.jpg";
    f.className="food";
    f.style.left=Math.random()*260+"px";
    f.style.top=Math.random()*160+"px";

    f.onclick=()=>{
      f.remove();
      score++;
      document.getElementById("feedScore").textContent=score;
      if(score>=5){hunger+=40;alert("満腹！");endFeed();update()}
    };

    area.appendChild(f);
  }
}
function endFeed(){switchScreen('main')}

// --- 掃除 ---
function startClean(){switchScreen('cleanScreen');spawnDirt()}
function spawnDirt(){
  const area=document.getElementById("cleanGameArea");
  area.innerHTML="";

  for(let i=0;i<8;i++){
    let d=document.createElement("div");
    d.className="dirt";
    d.style.left=Math.random()*260+"px";
    d.style.top=Math.random()*160+"px";

    d.onclick=()=>{
      d.remove();
      if(area.children.length===0){
        clean+=40;
        alert("ピカピカ！");
        endClean();
        update();
      }
    };

    area.appendChild(d);
  }
}
function endClean(){switchScreen('main')}

function switchScreen(id){
  document.getElementById("main").classList.add("hidden");
  document.getElementById("walk").classList.add("hidden");
  document.getElementById("feed").classList.add("hidden");
  document.getElementById("cleanScreen").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

setInterval(()=>{hunger-=1;clean-=1;fun-=1;update()},1000);
update();
</script>
</body>
</html>
